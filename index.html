<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HemispheriC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.1s ease;
        }

        body.flash-effect {
            background-color: #ffffff !important;
        }

        /* Panel superior - mantiene todo en una línea */
        .top-bar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* Control BPM - izquierda */
        .bpm-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 15px;
            border-radius: 40px;
            flex-shrink: 0;
        }

        .bpm-label {
            color: white;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .bpm-value {
            color: #ffd966;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 12px;
            border-radius: 30px;
            min-width: 70px;
            text-align: center;
        }

        input[type="range"] {
            width: 180px;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #3b82f6, #ef4444);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            border: 1px solid #1e2a3a;
        }

        /* Botones Play/Stop - EXACTAMENTE IGUALES */
        .controls {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .control-btn {
            border: none;
            outline: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: blue;
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
            line-height: 1;
            text-decoration: none;
            -webkit-appearance: none;
            appearance: none;
            font-family: inherit;
        }

        .control-btn.stop {
            background: grey;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }

        .control-btn:hover,
        .control-btn:focus,
        .control-btn:active {
            outline: none;
            border: none;
            text-decoration: none;
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        /* Panel de modo */
        .mode-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 40px;
            flex-shrink: 0;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .mode-btn.active {
            background: #8b5cf6;
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
        }

        /* Panel de patrón - siempre visible en la misma línea */
        .pattern-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .pattern-panel label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            white-space: nowrap;
        }

        .pattern-input {
            padding: 6px 12px;
            font-size: 12px;
            font-family: monospace;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 30px;
            outline: none;
            width: 120px;
            text-align: center;
            letter-spacing: 1px;
        }

        .apply-btn, .preset-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .apply-btn:hover, .preset-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .presets {
            display: flex;
            gap: 6px;
        }

        .hidden {
            display: none !important;
        }

        /* Área principal */
        .main-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .figures-container {
            display: flex;
            gap: clamp(60px, 12vw, 180px);
            justify-content: center;
            align-items: center;
            padding: 40px;
            width: 100%;
        }

        .single-figure-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* FIGURAS - Manteniendo proporciones correctas */
        .left-figure, .right-figure, .single-figure, .error-left-figure, .error-right-figure {
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.05s linear, transform 0.08s cubic-bezier(0.2, 1.2, 0.4, 1);
            text-align: center;
        }

        .left-figure.active, .right-figure.active, .single-figure.active,
        .error-left-figure.active, .error-right-figure.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Triángulo */
        .triangle-shape {
            width: 0;
            height: 0;
            border-left: clamp(140px, 22vw, 420px) solid transparent;
            border-right: clamp(140px, 22vw, 420px) solid transparent;
            border-bottom: clamp(240px, 38vh, 720px) solid #3b82f6;
            filter: drop-shadow(0 20px 40px rgba(59, 130, 246, 0.4));
        }

        /* Círculo */
        .circle-shape {
            width: clamp(140px, 22vw, 420px);
            height: clamp(140px, 22vw, 420px);
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.5);
        }

        /* Formas para modo error */
        .square-shape {
            width: clamp(140px, 22vw, 420px);
            height: clamp(140px, 22vw, 420px);
            background: #9b59b6;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(155, 89, 182, 0.5);
        }

        .star-shape {
            width: clamp(140px, 22vw, 420px);
            height: clamp(140px, 22vw, 420px);
            background: #f1c40f;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 20px 40px rgba(241, 196, 15, 0.5);
        }

        .heart-shape {
            width: clamp(140px, 22vw, 420px);
            height: clamp(140px, 22vw, 420px);
            background: #e74c3c;
            clip-path: path("M 50,25 C 50,15 40,10 30,18 C 20,26 20,38 30,48 C 40,58 50,65 50,65 C 50,65 60,58 70,48 C 80,38 80,26 70,18 C 60,10 50,15 50,25 Z");
            box-shadow: 0 20px 40px rgba(231, 76, 60, 0.5);
        }

        .emoji-shape {
            width: clamp(140px, 22vw, 420px);
            height: clamp(140px, 22vw, 420px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(80px, 15vw, 200px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
        }

        /* Modo aleatorio - figura central más grande */
        .single-figure .triangle-shape {
            border-left: clamp(180px, 28vw, 520px) solid transparent;
            border-right: clamp(180px, 28vw, 520px) solid transparent;
            border-bottom: clamp(310px, 48vh, 900px) solid #3b82f6;
        }

        .single-figure .circle-shape {
            width: clamp(180px, 28vw, 520px);
            height: clamp(180px, 28vw, 520px);
        }

        /* Animación */
        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .left-figure.active, .right-figure.active, .single-figure.active,
        .error-left-figure.active, .error-right-figure.active {
            animation: gentlePulse 0.8s ease-in-out;
        }

        /* Indicadores - ESTILO ORIGINAL MINIMALISTA */
        .status-bar {
            position: fixed;
            bottom: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 100;
        }

        .beat-light {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            transition: all 0.05s;
        }

        .beat-light.flash {
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
        }

        .space-hint {
            position: fixed;
            bottom: 15px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            z-index: 100;
        }

        /* RELOJ - ESTILO ORIGINAL MINIMALISTA, SIEMPRE VISIBLE */
        .timer-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        /* Media Queries - manteniendo top-bar en una línea */
        @media (max-width: 1200px) {
            .top-bar {
                gap: 12px;
                padding: 10px 16px;
            }

            .bpm-control {
                padding: 4px 12px;
            }

            input[type="range"] {
                width: 140px;
            }

            .control-btn {
                padding: 8px 24px;
                font-size: 28px;
            }

            .pattern-input {
                width: 100px;
            }

            .timer-indicator {
                top: 70px;
            }
        }

        @media (max-width: 1000px) {
            .top-bar {
                gap: 8px;
                padding: 8px 12px;
            }

            .bpm-label {
                font-size: 12px;
            }

            .bpm-value {
                font-size: 18px;
                min-width: 55px;
                padding: 2px 8px;
            }

            input[type="range"] {
                width: 100px;
            }

            .control-btn {
                padding: 6px 20px;
                font-size: 24px;
            }

            .mode-btn {
                padding: 4px 10px;
                font-size: 10px;
            }

            .pattern-panel {
                padding: 4px 10px;
            }

            .pattern-panel label {
                font-size: 10px;
            }

            .pattern-input {
                width: 85px;
                padding: 4px 8px;
                font-size: 10px;
            }

            .apply-btn, .preset-btn {
                padding: 4px 8px;
                font-size: 9px;
            }

            .presets {
                gap: 4px;
            }

            .timer-indicator {
                top: 65px;
                font-size: 9px;
                padding: 3px 8px;
            }
        }

        @media (max-width: 850px) {
            .top-bar {
                overflow-x: auto;
                justify-content: flex-start;
                gap: 12px;
            }

            .top-bar::-webkit-scrollbar {
                height: 2px;
            }

            .top-bar::-webkit-scrollbar-track {
                background: rgba(255,255,255,0.1);
            }

            .top-bar::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,0.3);
                border-radius: 10px;
            }
        }

        @media (max-width: 768px) {
            .figures-container {
                gap: 40px;
                padding: 20px;
            }

            .triangle-shape {
                border-left: 100px solid transparent;
                border-right: 100px solid transparent;
                border-bottom: 170px solid #3b82f6;
            }

            .circle-shape, .square-shape, .star-shape, .heart-shape, .emoji-shape {
                width: 100px;
                height: 100px;
            }

            .emoji-shape {
                font-size: 60px;
            }

            .single-figure .triangle-shape {
                border-left: 130px solid transparent;
                border-right: 130px solid transparent;
                border-bottom: 220px solid #3b82f6;
            }

            .single-figure .circle-shape {
                width: 130px;
                height: 130px;
            }
        }

        @media (max-width: 600px) and (orientation: portrait) {
            .timer-indicator {
                top: auto;
                bottom: 70px;
                right: 15px;
            }
        }

        @media (max-width: 900px) and (orientation: landscape) {
            .triangle-shape {
                border-left: 80px solid transparent;
                border-right: 80px solid transparent;
                border-bottom: 140px solid #3b82f6;
            }

            .circle-shape, .square-shape, .star-shape, .heart-shape, .emoji-shape {
                width: 80px;
                height: 80px;
            }

            .single-figure .triangle-shape {
                border-left: 100px solid transparent;
                border-right: 100px solid transparent;
                border-bottom: 170px solid #3b82f6;
            }

            .single-figure .circle-shape {
                width: 100px;
                height: 100px;
            }

            .timer-indicator {
                top: 60px;
            }
        }

        @media (min-width: 1920px) {
            .triangle-shape {
                border-left: 420px solid transparent;
                border-right: 420px solid transparent;
                border-bottom: 720px solid #3b82f6;
            }

            .circle-shape, .square-shape, .star-shape, .heart-shape, .emoji-shape {
                width: 420px;
                height: 420px;
            }

            .single-figure .triangle-shape {
                border-left: 520px solid transparent;
                border-right: 520px solid transparent;
                border-bottom: 900px solid #3b82f6;
            }

            .single-figure .circle-shape {
                width: 520px;
                height: 520px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="bpm-control">
            <span class="bpm-label">BPM</span>
            <input type="range" id="bpmSlider" min="40" max="160" value="80" step="1">
            <span class="bpm-value" id="bpmValue">80</span>
        </div>

        <div class="controls">
            <button id="playBtn" class="control-btn play">▶</button>
            <button id="stopBtn" class="control-btn stop">■</button>
        </div>

        <div class="mode-panel">
            <button id="patternModeBtn" class="mode-btn active">PATRÓN</button>
            <button id="randomModeBtn" class="mode-btn">ALEATORIO</button>
            <button id="errorModeBtn" class="mode-btn">ERROR</button>
        </div>

        <div id="patternPanel" class="pattern-panel">
            <label>PATRÓN:</label>
            <input type="text" id="patternInput" class="pattern-input" value="I D I D" placeholder="I D">
            <button id="applyPatternBtn" class="apply-btn">APLICAR</button>
            <div class="presets">
                <button class="preset-btn" data-pattern="I D I D">Alt</button>
                <button class="preset-btn" data-pattern="I I D D">Bin</button>
                <button class="preset-btn" data-pattern="I I I D D D">3:3</button>
                <button class="preset-btn" data-pattern="I D D I D D">Sínc</button>
            </div>
        </div>
    </div>

    <div id="timerIndicator" class="timer-indicator">0:00</div>

    <div id="patternMode" class="main-area">
        <div class="figures-container">
            <div class="left-figure" id="leftFigure">
                <div class="triangle-shape"></div>
            </div>
            <div class="right-figure" id="rightFigure">
                <div class="circle-shape"></div>
            </div>
        </div>
    </div>

    <div id="randomMode" class="main-area hidden">
        <div class="single-figure-container">
            <div class="single-figure" id="singleFigure">
                <div id="randomShape" class="triangle-shape"></div>
            </div>
        </div>
    </div>

    <div id="errorMode" class="main-area hidden">
        <div class="figures-container">
            <div class="error-left-figure inactive" id="errorLeftFigure">
                <div id="errorLeftShape"></div>
            </div>
            <div class="error-right-figure inactive" id="errorRightFigure">
                <div id="errorRightShape"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="beat-light" id="beatLight"></div>
        <span id="statusText">Listo</span>
    </div>

    <div class="space-hint">
        ␣ ESPACIO: PLAY / STOP
    </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        let isPlaying = false;
        let currentBeat = 0;
        let pattern = [];
        let currentTimeout = null;
        let audioContext = null;
        let currentMode = 'pattern';

        let currentRandomHand = null;
        let beatsRemainingForRandomFigure = 0;

        let currentErrorSide = null;
        let currentErrorFigureType = null;
        let beatsRemainingForErrorFigure = 0;
        let isErrorFigureActive = false;

        const faceEmojis = ['😈', '😨', '💀', '👽', '​🙈​', '​​​​💩', '👀', '👾', '​🐸', '​🙀', '​😓​', '​👹', '​🤡', '​😭', '​🤮', '🤬', '​🐲', '​🕷️', '​🐷​', '💨​', '🤯', '😵‍', '🤖​​'];
        let currentEmojiIndex = 0;

        let minuteSoundContext = null;
        let practiceStartTime = null;
        let minuteTimerInterval = null;
        let lastMinuteMark = -1;

        // Elementos DOM
        const leftFigure = document.getElementById('leftFigure');
        const rightFigure = document.getElementById('rightFigure');
        const singleFigure = document.getElementById('singleFigure');
        const randomShape = document.getElementById('randomShape');
        const errorLeftFigure = document.getElementById('errorLeftFigure');
        const errorRightFigure = document.getElementById('errorRightFigure');
        const errorLeftShape = document.getElementById('errorLeftShape');
        const errorRightShape = document.getElementById('errorRightShape');
        const patternModeDiv = document.getElementById('patternMode');
        const randomModeDiv = document.getElementById('randomMode');
        const errorModeDiv = document.getElementById('errorMode');
        const patternPanel = document.getElementById('patternPanel');
        const patternModeBtn = document.getElementById('patternModeBtn');
        const randomModeBtn = document.getElementById('randomModeBtn');
        const errorModeBtn = document.getElementById('errorModeBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmValue = document.getElementById('bpmValue');
        const patternInput = document.getElementById('patternInput');
        const applyPatternBtn = document.getElementById('applyPatternBtn');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const beatLight = document.getElementById('beatLight');
        const statusText = document.getElementById('statusText');
        const timerIndicator = document.getElementById('timerIndicator');

        // ==================== SONIDO METRÓNOMO (VOLUMEN X3) ====================
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playMetronomeSound() {
            if (!audioContext) return;

            const now = audioContext.currentTime;
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 2; // Volumen x3 (antes 0.4)
            gainNode.connect(audioContext.destination);

            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1200;
            oscillator.connect(gainNode);

            gainNode.gain.setValueAtTime(1.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
            oscillator.start();
            oscillator.stop(now + 0.08);
        }

        // ==================== SONIDO DEL MINUTO (DOS VECES CON DOBLE PARPADEO) ====================
        function initMinuteSoundContext() {
            if (!minuteSoundContext) {
                minuteSoundContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (minuteSoundContext.state === 'suspended') {
                minuteSoundContext.resume();
            }
        }

        function playSingleMinuteSound() {
            try {
                const now = minuteSoundContext.currentTime;

                // Primer tono más agudo
                const oscillator1 = minuteSoundContext.createOscillator();
                const gain1 = minuteSoundContext.createGain();
                oscillator1.connect(gain1);
                gain1.connect(minuteSoundContext.destination);
                oscillator1.frequency.value = 1046.50; // Do6
                gain1.gain.setValueAtTime(0.8, now);
                gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
                oscillator1.start();
                oscillator1.stop(now + 0.5);

                // Segundo tono más grave para armonía
                const oscillator2 = minuteSoundContext.createOscillator();
                const gain2 = minuteSoundContext.createGain();
                oscillator2.connect(gain2);
                gain2.connect(minuteSoundContext.destination);
                oscillator2.frequency.value = 783.99; // Sol5
                gain2.gain.setValueAtTime(0.6, now + 0.05);
                gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
                oscillator2.start();
                oscillator2.stop(now + 0.55);

                // Pequeño vibrato al final
                setTimeout(() => {
                    if (minuteSoundContext) {
                        const osc3 = minuteSoundContext.createOscillator();
                        const gain3 = minuteSoundContext.createGain();
                        osc3.connect(gain3);
                        gain3.connect(minuteSoundContext.destination);
                        osc3.frequency.value = 1318.51; // Mi6
                        gain3.gain.setValueAtTime(0.4, minuteSoundContext.currentTime);
                        gain3.gain.exponentialRampToValueAtTime(0.0001, minuteSoundContext.currentTime + 0.3);
                        osc3.start();
                        osc3.stop(minuteSoundContext.currentTime + 0.25);
                    }
                }, 200);
            } catch(e) {
                console.log('Error en sonido:', e);
            }
        }

        function playDoubleMinuteSound() {
            playSingleMinuteSound();
            setTimeout(() => {
                playSingleMinuteSound();
            }, 400);
        }

        function triggerDoubleFlash() {
            // Primer flash
            document.body.classList.add('flash-effect');
            setTimeout(() => {
                document.body.classList.remove('flash-effect');
                // Segundo flash después de 200ms
                setTimeout(() => {
                    document.body.classList.add('flash-effect');
                    setTimeout(() => {
                        document.body.classList.remove('flash-effect');
                    }, 200);
                }, 150);
            }, 200);

            // Animación en el reloj
            timerIndicator.style.transform = 'scale(1.3)';
            setTimeout(() => {
                timerIndicator.style.transform = 'scale(1)';
            }, 500);
        }

        function triggerThunderFlash() {
            initMinuteSoundContext();
            triggerDoubleFlash();
            playDoubleMinuteSound();
        }

        function startPracticeTimer() {
            if (minuteTimerInterval) clearInterval(minuteTimerInterval);
            practiceStartTime = Date.now();
            lastMinuteMark = -1;

            minuteTimerInterval = setInterval(() => {
                if (!isPlaying) return;
                const elapsedSeconds = Math.floor((Date.now() - practiceStartTime) / 1000);
                const minutes = Math.floor(elapsedSeconds / 60);
                const seconds = elapsedSeconds % 60;
                timerIndicator.textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;

                if (elapsedSeconds > 0 && elapsedSeconds % 60 === 0 && lastMinuteMark !== elapsedSeconds) {
                    lastMinuteMark = elapsedSeconds;
                    triggerThunderFlash();
                }
            }, 1000);
        }

        function stopPracticeTimer() {
            if (minuteTimerInterval) clearInterval(minuteTimerInterval);
            minuteTimerInterval = null;
            practiceStartTime = null;
            lastMinuteMark = -1;
            timerIndicator.textContent = `⏱️ 0:00`;
        }

        function updateBeatVisual() {
            beatLight.classList.add('flash');
            setTimeout(() => beatLight.classList.remove('flash'), 80);
        }

        // ==================== MODO PATRÓN CORREGIDO ====================
        function updatePatternVisuals() {
            const hand = pattern[currentBeat % pattern.length];

            leftFigure.classList.remove('active');
            rightFigure.classList.remove('active');
            leftFigure.classList.add('inactive');
            rightFigure.classList.add('inactive');

            if (hand === 'I') {
                leftFigure.classList.add('active');
                leftFigure.classList.remove('inactive');
                setTimeout(() => {
                    if (!isPlaying || currentMode !== 'pattern') return;
                    leftFigure.classList.remove('active');
                    leftFigure.classList.add('inactive');
                }, 150);
            } else {
                rightFigure.classList.add('active');
                rightFigure.classList.remove('inactive');
                setTimeout(() => {
                    if (!isPlaying || currentMode !== 'pattern') return;
                    rightFigure.classList.remove('active');
                    rightFigure.classList.add('inactive');
                }, 150);
            }

            const handName = hand === 'I' ? 'IZQ ▲' : 'DER ●';
            statusText.textContent = `${handName} • ${(currentBeat % pattern.length) + 1}/${pattern.length}`;
        }

        // ==================== MODO ALEATORIO ====================
        function generateNewRandomFigure() {
            const hands = ['I', 'D'];
            currentRandomHand = hands[Math.floor(Math.random() * 2)];
            beatsRemainingForRandomFigure = 2;
            if (currentRandomHand === 'I') randomShape.className = 'triangle-shape';
            else randomShape.className = 'circle-shape';
            singleFigure.classList.add('active');
            singleFigure.classList.remove('inactive');
        }

        function hideRandomFigure() {
            singleFigure.classList.remove('active');
            singleFigure.classList.add('inactive');
        }

        function updateRandomVisuals() {
            if (beatsRemainingForRandomFigure > 0) {
                beatsRemainingForRandomFigure--;
                const handName = currentRandomHand === 'I' ? 'IZQ ▲' : 'DER ●';
                statusText.textContent = `${handName} • ${beatsRemainingForRandomFigure + 1}/2 tiempos`;
                if (beatsRemainingForRandomFigure === 0) {
                    setTimeout(() => {
                        if (isPlaying && currentMode === 'random') hideRandomFigure();
                    }, 50);
                }
            } else {
                generateNewRandomFigure();
                const handName = currentRandomHand === 'I' ? 'IZQ ▲' : 'DER ●';
                statusText.textContent = `${handName} • 2/2 tiempos`;
            }
        }

        // ==================== MODO ERROR ====================
        function isTargetFigure(type) {
            return type === 'triangle' || type === 'circle';
        }

        function renderErrorShape(container, type) {
            container.innerHTML = '';
            const shapeDiv = document.createElement('div');
            switch(type) {
                case 'triangle':
                    shapeDiv.className = 'triangle-shape';
                    break;
                case 'circle':
                    shapeDiv.className = 'circle-shape';
                    break;
                case 'square':
                    shapeDiv.className = 'square-shape';
                    break;
                case 'star':
                    shapeDiv.className = 'star-shape';
                    break;
                case 'heart':
                    shapeDiv.className = 'heart-shape';
                    break;
                case 'emoji':
                    shapeDiv.className = 'emoji-shape';
                    currentEmojiIndex = (currentEmojiIndex + 1) % faceEmojis.length;
                    shapeDiv.textContent = faceEmojis[currentEmojiIndex];
                    break;
                default:
                    shapeDiv.className = 'triangle-shape';
            }
            container.appendChild(shapeDiv);
        }

        function getRandomErrorFigure() {
            const rand = Math.random();
            if (rand < 0.3) return 'triangle';
            if (rand < 0.6) return 'circle';
            const distractors = ['square', 'star', 'heart', 'emoji'];
            return distractors[Math.floor(Math.random() * distractors.length)];
        }

        function hideErrorFigure() {
            if (currentErrorSide === 'left') {
                errorLeftFigure.classList.remove('active');
                errorLeftFigure.classList.add('inactive');
            } else if (currentErrorSide === 'right') {
                errorRightFigure.classList.remove('active');
                errorRightFigure.classList.add('inactive');
            }
            isErrorFigureActive = false;
        }

        function generateNewErrorFigure() {
            if (isErrorFigureActive) hideErrorFigure();

            currentErrorSide = Math.random() < 0.5 ? 'left' : 'right';
            currentErrorFigureType = getRandomErrorFigure();

            if (currentErrorSide === 'left') {
                renderErrorShape(errorLeftShape, currentErrorFigureType);
                errorLeftFigure.classList.remove('inactive');
                errorLeftFigure.classList.add('active');
                errorRightFigure.classList.remove('active');
                errorRightFigure.classList.add('inactive');
            } else {
                renderErrorShape(errorRightShape, currentErrorFigureType);
                errorRightFigure.classList.remove('inactive');
                errorRightFigure.classList.add('active');
                errorLeftFigure.classList.remove('active');
                errorLeftFigure.classList.add('inactive');
            }

            isErrorFigureActive = true;
            beatsRemainingForErrorFigure = 2;
        }

        function getFigureIcon(type) {
            switch(type) {
                case 'triangle': return '▲';
                case 'circle': return '●';
                case 'square': return '■';
                case 'star': return '⭐';
                case 'heart': return '❤️';
                case 'emoji': return '😊';
                default: return '?';
            }
        }

        function updateErrorVisuals() {
            if (isErrorFigureActive) {
                beatsRemainingForErrorFigure--;
                const sideText = currentErrorSide === 'left' ? '← IZQUIERDA' : 'DERECHA →';
                const figureIcon = getFigureIcon(currentErrorFigureType);
                const shouldHit = isTargetFigure(currentErrorFigureType);

                if (shouldHit) {
                    statusText.textContent = `${sideText}  ${figureIcon}  → ¡GOLPEAR! (${beatsRemainingForErrorFigure + 1}/2)`;
                } else {
                    statusText.textContent = `${sideText}  ${figureIcon}  → IGNORAR (${beatsRemainingForErrorFigure + 1}/2)`;
                }

                if (beatsRemainingForErrorFigure <= 0) {
                    setTimeout(() => {
                        if (isPlaying && currentMode === 'error') {
                            generateNewErrorFigure();
                        }
                    }, 50);
                }
            } else {
                generateNewErrorFigure();
                const sideText = currentErrorSide === 'left' ? '← IZQUIERDA' : 'DERECHA →';
                const figureIcon = getFigureIcon(currentErrorFigureType);
                const shouldHit = isTargetFigure(currentErrorFigureType);

                if (shouldHit) {
                    statusText.textContent = `${sideText}  ${figureIcon}  → ¡GOLPEAR! (2/2)`;
                } else {
                    statusText.textContent = `${sideText}  ${figureIcon}  → IGNORAR (2/2)`;
                }
            }
        }

        // ==================== BEAT PRINCIPAL ====================
        function onBeat() {
            if (!isPlaying) return;
            if (currentMode === 'pattern' && pattern.length === 0) return;

            playMetronomeSound();
            updateBeatVisual();

            if (currentMode === 'pattern') {
                updatePatternVisuals();
                currentBeat++;
            } else if (currentMode === 'random') {
                updateRandomVisuals();
            } else if (currentMode === 'error') {
                updateErrorVisuals();
            }
        }

        function scheduleNextBeat() {
            if (!isPlaying) return;
            const bpm = parseInt(bpmSlider.value);
            const intervalMs = (60 / bpm) * 1000;
            onBeat();
            currentTimeout = setTimeout(() => scheduleNextBeat(), intervalMs);
        }

        function stopMetronome() {
            if (currentTimeout) clearTimeout(currentTimeout);
            isPlaying = false;
            currentBeat = 0;
            statusText.textContent = 'Detenido';
            beatLight.classList.remove('flash');
            stopPracticeTimer();

            leftFigure.classList.remove('active'); leftFigure.classList.add('inactive');
            rightFigure.classList.remove('active'); rightFigure.classList.add('inactive');
            singleFigure.classList.remove('active'); singleFigure.classList.add('inactive');
            errorLeftFigure.classList.remove('active'); errorLeftFigure.classList.add('inactive');
            errorRightFigure.classList.remove('active'); errorRightFigure.classList.add('inactive');

            currentRandomHand = null;
            beatsRemainingForRandomFigure = 0;
            isErrorFigureActive = false;
            beatsRemainingForErrorFigure = 0;
        }

        function startMetronome() {
            if (currentMode === 'pattern' && pattern.length === 0) {
                alert('Por favor, ingresa un patrón válido usando I (izquierda) y D (derecha)');
                return;
            }

            initAudioContext();
            stopMetronome();

            isPlaying = true;
            currentBeat = 0;

            if (currentMode === 'random') {
                currentRandomHand = null;
                beatsRemainingForRandomFigure = 0;
                generateNewRandomFigure();
            }
            if (currentMode === 'error') {
                isErrorFigureActive = false;
                beatsRemainingForErrorFigure = 0;
            }

            startPracticeTimer();
            statusText.textContent = 'Reproduciendo...';
            scheduleNextBeat();
        }

        function togglePlayStop() {
            if (isPlaying) stopMetronome();
            else startMetronome();
        }

        function updateTempo() {
            const newBpm = parseInt(bpmSlider.value);
            bpmValue.textContent = newBpm;
            if (isPlaying) startMetronome();
        }

        // ==================== CAMBIO DE MODOS ====================
        function setPatternMode() {
            currentMode = 'pattern';
            patternModeDiv.classList.remove('hidden');
            randomModeDiv.classList.add('hidden');
            errorModeDiv.classList.add('hidden');
            patternPanel.classList.remove('hidden');
            patternModeBtn.classList.add('active');
            randomModeBtn.classList.remove('active');
            errorModeBtn.classList.remove('active');
            if (isPlaying) startMetronome();
        }

        function setRandomMode() {
            currentMode = 'random';
            patternModeDiv.classList.add('hidden');
            randomModeDiv.classList.remove('hidden');
            errorModeDiv.classList.add('hidden');
            patternPanel.classList.add('hidden');
            patternModeBtn.classList.remove('active');
            randomModeBtn.classList.add('active');
            errorModeBtn.classList.remove('active');
            currentRandomHand = null;
            beatsRemainingForRandomFigure = 0;
            if (isPlaying) startMetronome();
        }

        function setErrorMode() {
            currentMode = 'error';
            patternModeDiv.classList.add('hidden');
            randomModeDiv.classList.add('hidden');
            errorModeDiv.classList.remove('hidden');
            patternPanel.classList.add('hidden');
            patternModeBtn.classList.remove('active');
            randomModeBtn.classList.remove('active');
            errorModeBtn.classList.add('active');
            isErrorFigureActive = false;
            beatsRemainingForErrorFigure = 0;
            if (isPlaying) startMetronome();
        }

        // ==================== PATRÓN ====================
        function parsePattern(input) {
            const cleanInput = input.toUpperCase().replace(/\s+/g, '');
            const patternArray = [];
            for (let i = 0; i < cleanInput.length; i++) {
                if (cleanInput[i] === 'I' || cleanInput[i] === 'D') patternArray.push(cleanInput[i]);
            }
            if (patternArray.length === 0) return null;
            return patternArray;
        }

        function applyPattern() {
            if (currentMode !== 'pattern') return;
            const parsed = parsePattern(patternInput.value);
            if (parsed) {
                pattern = parsed;
                if (isPlaying) startMetronome();
                else statusText.textContent = `Patrón: ${pattern.map(p => p === 'I' ? '▲' : '●').join(' ')}`;
            }
        }

        function applyPreset(preset) {
            patternInput.value = preset;
            applyPattern();
        }

        // ==================== EVENTOS ====================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePlayStop(); }
        });

        bpmSlider.addEventListener('input', updateTempo);
        applyPatternBtn.addEventListener('click', applyPattern);
        playBtn.addEventListener('click', startMetronome);
        stopBtn.addEventListener('click', stopMetronome);
        patternModeBtn.addEventListener('click', setPatternMode);
        randomModeBtn.addEventListener('click', setRandomMode);
        errorModeBtn.addEventListener('click', setErrorMode);

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => applyPreset(btn.getAttribute('data-pattern')));
        });

        // Inicialización
        applyPattern();
        leftFigure.classList.add('inactive');
        rightFigure.classList.add('inactive');
        singleFigure.classList.add('inactive');
        errorLeftFigure.classList.add('inactive');
        errorRightFigure.classList.add('inactive');


    </script>
</body>
</html>
